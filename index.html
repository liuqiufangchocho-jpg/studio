<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teacher Liu's Chinese Learning Studio</title>
  <!-- Version: portal_with_stats_v3_fix_stats_view -->

  <!-- Baloo 2 字体 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --gold: #FAC13E;
      --red: #D9082F;
      --cream: #FEFBC4;
      --deep-black: #050403;
      --soft-black: #11100B;
      --gold-soft: rgba(250, 193, 62, 0.68);
      --gold-faint: rgba(250, 193, 62, 0.16);
      --red-faint: rgba(217, 8, 47, 0.22);
      --cream-soft: rgba(254, 251, 196, 0.88);
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Baloo 2", "Microsoft YaHei", sans-serif;
      color: var(--cream);
      background:
        radial-gradient(circle at 50% 8%, rgba(250, 193, 62, 0.18), transparent 20%),
        radial-gradient(circle at 18% 90%, rgba(217, 8, 47, 0.22), transparent 24%),
        radial-gradient(circle at 85% 86%, rgba(217, 8, 47, 0.20), transparent 26%),
        linear-gradient(180deg, #050403 0%, #0B0906 48%, #030201 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(circle, rgba(250,193,62,0.28) 1px, transparent 1.4px),
        radial-gradient(circle, rgba(254,251,196,0.10) 1px, transparent 1.3px);
      background-size: 46px 46px, 79px 79px;
      background-position: 0 0, 25px 18px;
      opacity: 0.25;
      z-index: 0;
    }

    body::after {
      content: "";
      position: fixed;
      left: -80px;
      right: -80px;
      bottom: -90px;
      height: 210px;
      pointer-events: none;
      background:
        repeating-radial-gradient(
          circle at 8% 100%,
          transparent 0 34px,
          rgba(217, 8, 47, 0.34) 35px 38px
        ),
        repeating-radial-gradient(
          circle at 86% 100%,
          transparent 0 36px,
          rgba(250, 193, 62, 0.18) 37px 40px
        );
      opacity: 0.55;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      width: 100%;
      min-height: 100vh;
      padding: 44px 24px 56px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .title-wrap {
      position: relative;
      width: min(1120px, 94vw);
      margin-bottom: 28px;
      text-align: center;
    }

    .title-wrap::before,
    .title-wrap::after {
      content: "☀";
      position: absolute;
      top: 12px;
      color: var(--gold);
      font-size: 28px;
      text-shadow: 0 0 18px rgba(250, 193, 62, 0.72);
      opacity: 0.9;
    }

    .title-wrap::before {
      left: 23%;
    }

    .title-wrap::after {
      right: 23%;
    }

    .cloud-line {
      position: absolute;
      top: 26px;
      width: 220px;
      height: 34px;
      opacity: 0.48;
      pointer-events: none;
    }

    .cloud-line.left {
      left: 0;
      border-top: 2px solid rgba(250,193,62,0.55);
      border-left: 2px solid transparent;
      border-radius: 999px 0 0 0;
    }

    .cloud-line.right {
      right: 0;
      border-top: 2px solid rgba(250,193,62,0.55);
      border-right: 2px solid transparent;
      border-radius: 0 999px 0 0;
    }

    .site-title {
      margin: 0;
      text-align: center;
      line-height: 0.98;
      letter-spacing: 4px;
      color: var(--gold);
      text-shadow:
        0 3px 0 rgba(100, 56, 0, 0.65),
        0 0 18px rgba(250, 193, 62, 0.42),
        0 14px 36px rgba(250, 193, 62, 0.22);
    }

    .title-line-1,
    .title-line-2 {
      display: block;
      font-weight: 800;
    }

    .title-line-1 {
      font-size: clamp(34px, 4.5vw, 68px);
    }

    .title-line-2 {
      margin-top: 8px;
      font-size: clamp(28px, 3.8vw, 56px);
    }

    .portal-wrap {
      width: min(1260px, 96vw);
      position: relative;
      margin-top: 10px;
    }

    .panorama {
      position: relative;
      height: 430px;
      perspective: 1180px;
      perspective-origin: center center;
      border-radius: 34px;
      background:
        radial-gradient(circle at 50% 14%, rgba(250, 193, 62, 0.13), transparent 35%),
        linear-gradient(180deg, rgba(39, 29, 11, 0.78), rgba(9, 8, 5, 0.92));
      border: 2px solid rgba(250, 193, 62, 0.78);
      box-shadow:
        0 0 0 1px rgba(254,251,196,0.12),
        inset 0 0 46px rgba(250,193,62,0.10),
        0 30px 70px rgba(0,0,0,0.58),
        0 0 42px rgba(250,193,62,0.16);
      overflow: visible;
    }

    .panorama::before {
      content: "";
      position: absolute;
      left: 56px;
      right: 56px;
      bottom: 60px;
      height: 130px;
      border-radius: 50%;
      border-bottom: 2px solid rgba(217, 8, 47, 0.82);
      border-top: 1px solid rgba(250, 193, 62, 0.32);
      transform: scaleX(1.04);
      pointer-events: none;
      opacity: 0.82;
    }

    .panorama::after {
      content: "";
      position: absolute;
      inset: 16px;
      border-radius: 26px;
      background:
        radial-gradient(circle at 6% 28%, rgba(250,193,62,0.12), transparent 16%),
        radial-gradient(circle at 92% 30%, rgba(250,193,62,0.10), transparent 18%),
        linear-gradient(135deg, transparent 0 48%, rgba(254,251,196,0.035) 49%, transparent 50%);
      background-size: auto, auto, 34px 34px;
      pointer-events: none;
      opacity: 0.8;
    }

    .temple-shadow {
      position: absolute;
      left: 54px;
      top: 54px;
      width: 130px;
      height: 100px;
      color: rgba(250, 193, 62, 0.30);
      font-size: 84px;
      filter: drop-shadow(0 0 14px rgba(250,193,62,0.12));
      opacity: 0.72;
      pointer-events: none;
      z-index: 1;
    }

    .cloud-deco {
      position: absolute;
      color: rgba(250, 193, 62, 0.26);
      font-size: 64px;
      pointer-events: none;
      z-index: 1;
    }

    .cloud-deco.one {
      right: 74px;
      top: 52px;
    }

    .cloud-deco.two {
      right: -10px;
      bottom: 14px;
      font-size: 88px;
      opacity: 0.42;
    }

    .cards-layer {
      position: absolute;
      inset: 0;
      transform-style: preserve-3d;
      pointer-events: none;
      z-index: 4;
    }

    .game-card {
      position: absolute;
      top: 58px;
      left: 50%;
      width: 204px;
      height: 300px;
      margin-left: -102px;
      border: none;
      border-radius: 24px;
      background: var(--cream);
      color: #5B2505;
      box-shadow:
        0 20px 36px rgba(0,0,0,0.48),
        0 0 0 2px rgba(250,193,62,0.86),
        0 0 26px rgba(250,193,62,0.14);
      cursor: pointer;
      transform-style: preserve-3d;
      transition:
        transform 0.55s cubic-bezier(.2,.8,.2,1),
        filter 0.25s ease,
        box-shadow 0.25s ease,
        background 0.25s ease;
      overflow: hidden;
      padding: 0;
      font-family: inherit;
      pointer-events: auto;
      -webkit-tap-highlight-color: transparent;
    }

    .slot-0,
    .slot-4 {
      z-index: 3;
    }

    .slot-1,
    .slot-3 {
      z-index: 4;
    }

    .slot-2 {
      z-index: 5;
    }

    .game-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 26%, rgba(255,255,255,0.72), transparent 30%),
        radial-gradient(circle at 50% 28%, rgba(250,193,62,0.22), transparent 46%),
        linear-gradient(180deg, #FFF8D0 0%, #FEFBC4 57%, var(--red) 57%, #B90427 100%);
      z-index: 0;
    }

    .game-card::after {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 18px;
      border: 2px solid rgba(250, 193, 62, 0.82);
      box-shadow:
        inset 0 0 0 1px rgba(120, 58, 6, 0.18),
        inset 0 0 16px rgba(250,193,62,0.16);
      pointer-events: none;
      z-index: 3;
    }


    .card-inner {
      position: relative;
      z-index: 2;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .icon-wrap {
      width: 100%;
      height: 57%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-top: 22px;
      position: relative;
    }

    .icon-wrap::before {
      content: "";
      position: absolute;
      width: 138px;
      height: 138px;
      border-radius: 50%;
      border: 2px solid rgba(250, 193, 62, 0.72);
      box-shadow:
        inset 0 0 22px rgba(250,193,62,0.12),
        0 0 18px rgba(250,193,62,0.10);
    }

    .icon-wrap::after {
      content: "";
      position: absolute;
      width: 108px;
      height: 108px;
      border-radius: 50%;
      border: 1px solid rgba(217,8,47,0.18);
    }

    .icon {
      position: relative;
      z-index: 2;
      width: 112px;
      height: 112px;
      border-radius: 30px;
      display: grid;
      place-items: center;
      font-size: 68px;
      background: rgba(255, 255, 255, 0.20);
      filter: drop-shadow(0 12px 14px rgba(84, 38, 4, 0.25));
      transition: transform 0.25s ease;
    }

    .text-panel {
      width: 100%;
      height: 43%;
      padding: 19px 16px 12px;
      color: var(--cream);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .game-title {
      margin: 0 0 5px;
      font-size: 24px;
      line-height: 1.12;
      color: #FFF7BF;
      font-weight: 800;
      text-shadow: 0 2px 0 rgba(80, 0, 12, 0.55);
    }

    .game-en {
      margin: 0;
      font-size: 13px;
      line-height: 1.15;
      color: rgba(254,251,196,0.92);
      font-weight: 700;
    }

    .ornament {
      width: 84px;
      height: 14px;
      margin-top: 8px;
      position: relative;
    }

    .ornament::before,
    .ornament::after {
      content: "";
      position: absolute;
      top: 6px;
      width: 34px;
      height: 1px;
      background: rgba(250,193,62,0.70);
    }

    .ornament::before {
      left: 0;
    }

    .ornament::after {
      right: 0;
    }

    .ornament span {
      position: absolute;
      left: 50%;
      top: 2px;
      width: 10px;
      height: 10px;
      border: 1px solid rgba(250,193,62,0.78);
      transform: translateX(-50%) rotate(45deg);
    }

    .game-card:hover {
      filter: brightness(1.08) saturate(1.08);
      box-shadow:
        0 24px 46px rgba(0,0,0,0.58),
        0 0 0 2px rgba(250,193,62,1),
        0 0 34px rgba(250,193,62,0.44);
    }

    .game-card:hover .icon,
    .game-card.clicked .icon {
      transform: scale(1.12);
    }

    .game-card.clicked {
      filter: brightness(1.10) saturate(1.12);
      box-shadow:
        0 28px 56px rgba(0,0,0,0.68),
        0 0 0 2px rgba(250,193,62,1),
        0 0 44px rgba(250,193,62,0.58);
    }

    .slot-0 {
      transform: translateX(-440px) translateZ(-78px) rotateY(28deg);
      opacity: 0.82;
    }

    .slot-1 {
      transform: translateX(-225px) translateZ(6px) rotateY(14deg);
      opacity: 0.94;
    }

    .slot-2 {
      transform: translateX(0) translateZ(78px) rotateY(0deg);
      opacity: 1;
    }

    .slot-3 {
      transform: translateX(225px) translateZ(6px) rotateY(-14deg);
      opacity: 0.94;
    }

    .slot-4 {
      transform: translateX(440px) translateZ(-78px) rotateY(-28deg);
      opacity: 0.82;
    }

    .slot-0:hover,
    .slot-0.clicked {
      transform: translateX(-440px) translateZ(-42px) rotateY(28deg) scale(1.045);
    }

    .slot-1:hover,
    .slot-1.clicked {
      transform: translateX(-225px) translateZ(44px) rotateY(14deg) scale(1.045);
    }

    .slot-2:hover,
    .slot-2.clicked {
      transform: translateX(0) translateZ(116px) rotateY(0deg) scale(1.045);
    }

    .slot-3:hover,
    .slot-3.clicked {
      transform: translateX(225px) translateZ(44px) rotateY(-14deg) scale(1.045);
    }

    .slot-4:hover,
    .slot-4.clicked {
      transform: translateX(440px) translateZ(-42px) rotateY(-28deg) scale(1.045);
    }

    .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 64px;
      height: 64px;
      border: 2px solid rgba(250,193,62,0.9);
      border-radius: 999px;
      background:
        radial-gradient(circle at 50% 35%, rgba(250,193,62,0.20), rgba(0,0,0,0.86));
      color: var(--gold);
      font-size: 46px;
      line-height: 1;
      font-family: Georgia, serif;
      cursor: pointer;
      box-shadow:
        0 0 22px rgba(250,193,62,0.32),
        inset 0 0 16px rgba(250,193,62,0.12);
      transition: all 0.22s ease;
      z-index: 30;
    }

    .nav-btn:hover {
      background:
        radial-gradient(circle at 50% 35%, rgba(250,193,62,0.34), rgba(0,0,0,0.84));
      transform: translateY(-50%) scale(1.08);
      box-shadow:
        0 0 34px rgba(250,193,62,0.46),
        inset 0 0 18px rgba(250,193,62,0.18);
    }

    .nav-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      transform: translateY(-50%);
    }

    .prev-btn {
      left: -34px;
    }

    .next-btn {
      right: -34px;
    }

    .page-dots {
      margin-top: 26px;
      display: flex;
      justify-content: center;
      gap: 18px;
      position: relative;
    }

    .page-dots::before,
    .page-dots::after {
      content: "";
      position: absolute;
      top: 50%;
      width: 190px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(250,193,62,0.62));
    }

    .page-dots::before {
      right: calc(100% + 24px);
    }

    .page-dots::after {
      left: calc(100% + 24px);
      transform: rotate(180deg);
    }

    .dot {
      width: 13px;
      height: 13px;
      border-radius: 999px;
      border: 2px solid rgba(250,193,62,0.86);
      background: transparent;
      transition: all 0.25s ease;
      box-shadow: 0 0 12px rgba(250,193,62,0.18);
    }

    .dot.active {
      background: var(--gold);
      box-shadow: 0 0 18px rgba(250,193,62,0.75);
      transform: scale(1.16);
    }



    /* ===== DATA STATISTICS MODULE ===== */
    .stats-module {
      position: relative;
      z-index: 2;
      display: none;
      width: 100%;
      min-height: 100vh;
      padding: 44px 24px 56px;
      background:
        radial-gradient(circle at 50% 8%, rgba(250, 193, 62, 0.18), transparent 20%),
        radial-gradient(circle at 18% 90%, rgba(217, 8, 47, 0.22), transparent 24%),
        radial-gradient(circle at 85% 86%, rgba(217, 8, 47, 0.20), transparent 26%),
        linear-gradient(180deg, #050403 0%, #0B0906 48%, #030201 100%);
      font-family: "Microsoft YaHei", "Baloo 2", sans-serif;
    }

    body.stats-view .page {
      display: none;
    }

    body.stats-view .stats-module.open {
      display: block;
    }

    .stats-panel {
      width: min(1260px, 96vw);
      min-height: calc(100vh - 88px);
      margin: 0 auto;
      background:
        linear-gradient(180deg, rgba(254,251,196,0.99), rgba(255,246,197,0.97));
      color: #4B2104;
      border: 2px solid rgba(250,193,62,0.95);
      border-radius: 28px;
      box-shadow:
        0 28px 80px rgba(0,0,0,0.62),
        0 0 40px rgba(250,193,62,0.25);
      padding: 28px;
    }

    .stats-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 18px;
      border-bottom: 2px solid rgba(217, 8, 47, 0.18);
      padding-bottom: 14px;
    }

    .stats-title {
      margin: 0;
      font-size: clamp(26px, 3vw, 38px);
      line-height: 1.15;
      color: #B90427;
      letter-spacing: 1px;
      font-family: "Baloo 2", "Microsoft YaHei", sans-serif;
    }

    .stats-subtitle {
      margin: 6px 0 0;
      color: rgba(75,33,4,0.72);
      font-size: 14px;
      line-height: 1.55;
      font-weight: 700;
    }

    .stats-close {
      flex: 0 0 auto;
      border: 2px solid rgba(185,4,39,0.26);
      border-radius: 999px;
      background: #fff4c4;
      color: #B90427;
      min-width: 112px;
      height: 42px;
      padding: 0 16px;
      font-size: 15px;
      font-weight: 900;
      line-height: 1;
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease;
      font-family: "Baloo 2", "Microsoft YaHei", sans-serif;
    }

    .stats-close:hover {
      transform: scale(1.04);
      background: #FFE99B;
    }

    .stats-search-box {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto auto;
      gap: 12px;
      margin: 18px 0 8px;
    }

    .stats-input {
      width: 100%;
      border: 2px solid rgba(250,193,62,0.9);
      border-radius: 16px;
      padding: 14px 16px;
      background: #fffdf0;
      color: #3B1A03;
      font-size: 15px;
      outline: none;
      font-family: "Microsoft YaHei", sans-serif;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.05);
    }

    .stats-input:focus {
      border-color: #D9082F;
      box-shadow: 0 0 0 4px rgba(217,8,47,0.08);
    }

    .stats-search-btn {
      border: none;
      border-radius: 16px;
      padding: 0 24px;
      min-width: 132px;
      background: linear-gradient(135deg, #D9082F, #9C0623);
      color: #FEFBC4;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 9px 20px rgba(217,8,47,0.24);
      font-family: "Baloo 2", "Microsoft YaHei", sans-serif;
      transition: transform 0.18s ease, filter 0.18s ease;
    }

    .stats-search-btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.06);
    }

    .stats-search-btn:disabled {
      opacity: 0.55;
      cursor: wait;
      transform: none;
    }

    .stats-export-btn {
      border: none;
      border-radius: 16px;
      padding: 0 22px;
      min-width: 138px;
      background: linear-gradient(135deg, #2E7D32, #1B5E20);
      color: #FEFBC4;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 9px 20px rgba(46,125,50,0.22);
      font-family: "Baloo 2", "Microsoft YaHei", sans-serif;
      transition: transform 0.18s ease, filter 0.18s ease;
    }

    .stats-export-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      filter: brightness(1.06);
    }

    .stats-export-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }

    .stats-csv-btn {
      border: none;
      border-radius: 16px;
      padding: 0 22px;
      min-width: 126px;
      background: linear-gradient(135deg, #1565C0, #0D47A1);
      color: #FEFBC4;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 9px 20px rgba(21,101,192,0.22);
      font-family: "Baloo 2", "Microsoft YaHei", sans-serif;
      transition: transform 0.18s ease, filter 0.18s ease;
    }

    .stats-csv-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      filter: brightness(1.06);
    }

    .stats-csv-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }

    .stats-sort-row {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      margin: 10px 0 4px;
      color: #6E3408;
      font-size: 14px;
      font-weight: 800;
    }

    .stats-sort-select {
      min-width: 190px;
      border: 1px solid rgba(250,193,62,0.9);
      border-radius: 12px;
      padding: 9px 12px;
      background: #fffdf0;
      color: #4B2104;
      font-family: "Microsoft YaHei", sans-serif;
      outline: none;
    }

    .rate-card {
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .rate-card.rate-low {
      background: rgba(255,235,238,0.9);
      border-color: rgba(198,40,40,0.34);
    }

    .rate-card.rate-low .stats-summary-value { color: #C62828; }

    .rate-card.rate-mid {
      background: rgba(255,248,225,0.94);
      border-color: rgba(245,124,0,0.38);
    }

    .rate-card.rate-mid .stats-summary-value { color: #EF6C00; }

    .rate-card.rate-high {
      background: rgba(232,245,233,0.94);
      border-color: rgba(46,125,50,0.34);
    }

    .rate-card.rate-high .stats-summary-value { color: #2E7D32; }

    .task-meta-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .task-meta-details { flex: 1; }

    .task-state-pill {
      display: inline-flex;

  <script src="./js/supabase-config.js"></script>

  <script>
    /*

      2. 修改跳转链接：把 url: "#" 替换成你的真实网页链接。
      3. 新增模块：继续往 cards 数组里添加新的 { title, en, icon, url }。
      4. 每页自动展示 5 张卡片。
    */

    const cards = [
      {

        url: "https://liuqiufangchocho-jpg.github.io/lianxianpdf/"
      },
      {
        title: "汉字迷宫",
        en: "Pinyin Crossword Printable",
        icon: "🕵🏻‍♂️",
        url: "https://liuqiufangchocho-jpg.github.io/hanzimigong/"
      },
      {
        title: "汉字涂色",
        en: "Pinyin Crossword Printable",

        url: "https://liuqiufangchocho-jpg.github.io/hanzituse/"

        icon: "✨",
        url: "#"
      }
    ];

    let lastStatsExport = null;
    let currentStatsTask = null;
    let currentStatsResults = [];
    let currentStatsSort = 'class-name';

    const cardsPerPage = 5;
    let currentPage = 0;

    const cardsLayer = document.getElementById("cardsLayer");
    const pageDots = document.getElementById("pageDots");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");

    function getTotalPages() {
      return Math.ceil(cards.length / cardsPerPage);
    }



    // ===== SHARED TASK SYSTEM / TASK STATISTICS =====
    function openStatsModule() {
      const module = document.getElementById("statsModule");
      if (!module) {
        alert("数据统计模块没有正确加载，请检查页面代码。");
        return;
      }
      document.body.classList.add("stats-view");
      module.classList.add("open");
      module.setAttribute("aria-hidden", "false");
      window.scrollTo({ top: 0, behavior: "auto" });
      setTimeout(() => {
        const input = document.getElementById("taskSearchInput");
        if (input) input.focus();
      }, 80);
    }

    function closeStatsModule() {
      const module = document.getElementById("statsModule");
      if (module) {
        module.classList.remove("open");
        module.setAttribute("aria-hidden", "true");
      }
      document.body.classList.remove("stats-view");
      window.scrollTo({ top: 0, behavior: "auto" });
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function normalizeClassData(classData) {
      if (!classData) return [];
      if (Array.isArray(classData)) return classData;
      if (typeof classData === "string") {
        try {
          const parsed = JSON.parse(classData);
          return Array.isArray(parsed) ? parsed : [];
        } catch (error) {
          return [];
        }
      }
      return [];
    }

    function formatDate(value) {
      if (!value) return "-";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "-";
      return date.toLocaleString("zh-CN", { hour12: false });
    }

    function formatNumber(value, suffix = "") {
      if (value === null || value === undefined || value === "") return "-";
      return `${value}${suffix}`;
    }

    function sanitizeFileName(value) {
      return String(value || "task_results")
        .replace(/[\/:*?"<>|]/g, "_")
        .replace(/\s+/g, "_")
        .slice(0, 80) || "task_results";
    }

    function getResultKey(className, studentName) {
      return `${className || ""}||${studentName || ""}`;
    }

    function getResultDate(result) {
      return result ? (result.completed_at || result.updated_at || result.created_at || null) : null;
    }

    function buildStudentRows(task, results) {
      const classData = normalizeClassData(task.class_data);
      const resultMap = new Map();

      results.forEach(result => {
        resultMap.set(getResultKey(result.class_name, result.student_name), result);
      });

      const rows = [];
      classData.forEach(group => {
        const className = group.className || group.class_name || group.class || "";
        const students = Array.isArray(group.students) ? group.students : [];
        students.forEach(studentName => {
          rows.push({
            className,
            studentName,
            result: resultMap.get(getResultKey(className, studentName)) || null
          });
        });
      });

      if (!rows.length) {
        results.forEach(result => {
          rows.push({
            className: result.class_name || "-",
            studentName: result.student_name || "-",
            result
          });
        });
      }

      return rows;
    }

    function sortStudentRows(rows, mode) {
      const sorted = [...rows];
      const compareText = (a, b) => String(a || "").localeCompare(String(b || ""), "zh-CN", { numeric: true });

      sorted.sort((a, b) => {
        if (mode === "name") {
          return compareText(a.studentName, b.studentName) || compareText(a.className, b.className);
        }

        if (mode === "status") {
          const aDone = a.result ? 1 : 0;
          const bDone = b.result ? 1 : 0;
          return aDone - bDone || compareText(a.className, b.className) || compareText(a.studentName, b.studentName);
        }

        if (mode === "score") {
          const aScore = a.result && a.result.score !== null ? Number(a.result.score) : -Infinity;
          const bScore = b.result && b.result.score !== null ? Number(b.result.score) : -Infinity;
          return bScore - aScore || compareText(a.className, b.className) || compareText(a.studentName, b.studentName);
        }

        if (mode === "completed") {
          const aTime = getResultDate(a.result) ? new Date(getResultDate(a.result)).getTime() : -Infinity;
          const bTime = getResultDate(b.result) ? new Date(getResultDate(b.result)).getTime() : -Infinity;
          return bTime - aTime || compareText(a.className, b.className) || compareText(a.studentName, b.studentName);
        }

        return compareText(a.className, b.className) || compareText(a.studentName, b.studentName);
      });

      return sorted;
    }

    function getRateClass(rate) {
      if (rate >= 80) return "rate-high";
      if (rate >= 50) return "rate-mid";
      return "rate-low";
    }

    function getExportableRows(rows) {
      return rows.map(row => {
        const result = row.result;
        const completedAt = getResultDate(result);
        return {
          className: row.className || "-",
          studentName: row.studentName || "-",
          status: result ? "已完成" : "未完成",
          bestScore: result ? result.score : null,
          accuracy: result ? result.accuracy : null,
          duration: result ? result.duration_seconds : null,
          attempts: result ? result.attempts : null,
          completedAt: completedAt ? formatDate(completedAt) : "-"
        };
      });
    }

    function downloadBlob(blob, fileName) {
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = fileName;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
    }

    function exportStatsToExcel() {
      if (!lastStatsExport?.rows?.length) {
        alert("请先查询一个任务，再导出 Excel 表格。");
        return;
      }

      const { task, rows } = lastStatsExport;
      const taskTitle = task.task_title || "未命名任务";
      const fileName = sanitizeFileName(`${taskTitle}_${task.task_code}_完成情况`) + ".xls";
      const headers = ["班级", "姓名", "状态", "最高分", "正确率", "用时", "尝试次数", "完成时间"];
      const taskState = TaskSystem.getTaskState(task);

      const tableRows = rows.map(row => `
        <tr>
          <td>${escapeHtml(row.className)}</td>
          <td>${escapeHtml(row.studentName)}</td>
          <td>${escapeHtml(row.status)}</td>
          <td>${formatNumber(row.bestScore)}</td>
          <td>${formatNumber(row.accuracy, row.accuracy !== null && row.accuracy !== undefined ? "%" : "")}</td>
          <td>${formatNumber(row.duration, row.duration !== null && row.duration !== undefined ? "s" : "")}</td>
          <td>${formatNumber(row.attempts)}</td>
          <td>${escapeHtml(row.completedAt)}</td>
        </tr>
      `).join("");

      const workbookHtml = `
        <!DOCTYPE html>
        <html>
        <head>
          <meta charset="UTF-8">
          <style>
            table { border-collapse: collapse; font-family: Arial, "Microsoft YaHei", sans-serif; }
            th, td { border: 1px solid #999; padding: 8px 10px; mso-number-format:"\\@"; }
            th { background: #FCE4D6; font-weight: bold; }
            .meta td { border: none; padding: 4px 0; }
          </style>
        </head>
        <body>
          <h2>${escapeHtml(taskTitle)} - 任务完成情况</h2>
          <table class="meta">
            <tr><td><strong>Task ID：</strong>${escapeHtml(task.task_code)}</td></tr>
            <tr><td><strong>游戏：</strong>${escapeHtml(task.game_name || task.game_key || "-")}</td></tr>
            <tr><td><strong>任务状态：</strong>${escapeHtml(taskState.label)}</td></tr>
            <tr><td><strong>截止日期：</strong>${formatDate(task.expires_at)}</td></tr>
            <tr><td><strong>创建时间：</strong>${formatDate(task.created_at)}</td></tr>
          </table>
          <br>
          <table>
            <thead><tr>${headers.map(header => `<th>${header}</th>`).join("")}</tr></thead>
            <tbody>${tableRows}</tbody>
          </table>
        </body>
        </html>`;

      downloadBlob(
        new Blob(["\uFEFF", workbookHtml], { type: "application/vnd.ms-excel;charset=utf-8" }),
        fileName
      );
    }

    function csvEscape(value) {
      const text = String(value ?? "");
      return /[",\n\r]/.test(text) ? `"${text.replace(/"/g, '""')}"` : text;
    }

    function exportStatsToCsv() {
      if (!lastStatsExport?.rows?.length) {
        alert("请先查询一个任务，再导出 CSV 表格。");
        return;
      }

      const { task, rows } = lastStatsExport;
      const taskTitle = task.task_title || "未命名任务";
      const fileName = sanitizeFileName(`${taskTitle}_${task.task_code}_完成情况`) + ".csv";
      const headers = ["班级", "姓名", "状态", "最高分", "正确率", "用时（秒）", "尝试次数", "完成时间"];
      const lines = [headers.map(csvEscape).join(",")];

      rows.forEach(row => {
        lines.push([
          row.className,
          row.studentName,
          row.status,
          row.bestScore ?? "",
          row.accuracy ?? "",
          row.duration ?? "",
          row.attempts ?? "",
          row.completedAt
        ].map(csvEscape).join(","));
      });

      downloadBlob(
        new Blob(["\uFEFF" + lines.join("\r\n")], { type: "text/csv;charset=utf-8" }),
        fileName
      );
    }

    function setStatsControlsEnabled(enabled) {
      const excelBtn = document.getElementById("exportExcelBtn");
      const csvBtn = document.getElementById("exportCsvBtn");
      const sortSelect = document.getElementById("statsSortSelect");
      if (excelBtn) excelBtn.disabled = !enabled;
      if (csvBtn) csvBtn.disabled = !enabled;
      if (sortSelect) sortSelect.disabled = !enabled;
    }

    function renderTaskResults(task, results) {
      currentStatsTask = task;
      currentStatsResults = results;

      const unsortedRows = buildStudentRows(task, results);
      const rows = sortStudentRows(unsortedRows, currentStatsSort);
      const expected = rows.length;
      const completed = rows.filter(row => Boolean(row.result)).length;
      const rate = expected > 0 ? Math.round((completed / expected) * 100) : 0;
      const classData = normalizeClassData(task.class_data);
      const classCount = classData.length || new Set(rows.map(row => row.className).filter(Boolean)).size;
      const taskTitle = task.task_title || "未命名任务";
      const gameName = task.game_name || task.game_key || "-";
      const taskState = TaskSystem.getTaskState(task);

      lastStatsExport = { task, rows: getExportableRows(rows) };
      setStatsControlsEnabled(rows.length > 0);

      const summaryHtml = `
        <div class="stats-summary-grid">
          <div class="stats-summary-card">
            <div class="stats-summary-label">应完成学生数</div>
            <div class="stats-summary-value">${expected}</div>
          </div>
          <div class="stats-summary-card">
            <div class="stats-summary-label">已完成学生数</div>
            <div class="stats-summary-value">${completed}</div>
          </div>
          <div class="stats-summary-card rate-card ${getRateClass(rate)}">
            <div class="stats-summary-label">完成率</div>
            <div class="stats-summary-value">${rate}%</div>
          </div>
          <div class="stats-summary-card">
            <div class="stats-summary-label">班级数</div>
            <div class="stats-summary-value">${classCount || "-"}</div>
          </div>
        </div>`;

      const isExpired = taskState.code === "expired";
      const toggleLabel = task.status === "closed" ? "重新开放任务" : "关闭任务";
      const toggleClass = task.status === "closed" ? "task-status-toggle reopen" : "task-status-toggle";
      const toggleDisabled = isExpired ? "disabled" : "";

      const metaHtml = `
        <div class="task-meta">
          <div class="task-meta-top">
            <div class="task-meta-details">
              <strong>任务：</strong>${escapeHtml(taskTitle)}<br>
              <strong>Task ID：</strong>${escapeHtml(task.task_code)}<br>
              <strong>游戏：</strong>${escapeHtml(gameName)}<br>
              <strong>任务状态：</strong><span class="task-state-pill task-state-${taskState.code}">${taskState.label}</span><br>
              <strong>截止日期：</strong>${formatDate(task.expires_at)}<br>
              <strong>创建时间：</strong>${formatDate(task.created_at)}
            </div>
            <button class="${toggleClass}" type="button" onclick="toggleCurrentTaskStatus()" ${toggleDisabled}>
              ${isExpired ? "任务已过期" : toggleLabel}
            </button>
          </div>
        </div>`;

      if (!rows.length) {
        document.getElementById("statsResults").innerHTML = summaryHtml + metaHtml + `<div class="stats-empty">已找到任务，但目前没有学生名单或提交记录。</div>`;
        return;
      }

      const tableRows = rows.map(row => {
        const result = row.result;
        const isDone = Boolean(result);
        return `
          <tr>
            <td>${escapeHtml(row.className || "-")}</td>
            <td>${escapeHtml(row.studentName || "-")}</td>
            <td><span class="status-pill ${isDone ? "status-done" : "status-pending"}">${isDone ? "Completed" : "Not completed"}</span></td>
            <td>${formatNumber(result ? result.score : null)}</td>
            <td>${formatNumber(result ? result.accuracy : null, result && result.accuracy !== null && result.accuracy !== undefined ? "%" : "")}</td>
            <td>${formatNumber(result ? result.duration_seconds : null, result && result.duration_seconds !== null && result.duration_seconds !== undefined ? "s" : "")}</td>
            <td>${formatNumber(result ? result.attempts : null)}</td>
            <td>${formatDate(getResultDate(result))}</td>
          </tr>`;
      }).join("");

      const tableHtml = `
        <div class="results-table-wrap">
          <table class="results-table">
            <thead>
              <tr>
                <th>班级</th>
                <th>姓名</th>
                <th>状态</th>
                <th>最高分</th>
                <th>正确率</th>
                <th>用时</th>
                <th>尝试次数</th>
                <th>完成时间</th>
              </tr>
            </thead>
            <tbody>${tableRows}</tbody>
          </table>
        </div>`;

      document.getElementById("statsResults").innerHTML = summaryHtml + metaHtml + tableHtml;
    }

    function changeStatsSort(value) {
      currentStatsSort = value || "class-name";
      if (currentStatsTask) {
        renderTaskResults(currentStatsTask, currentStatsResults);
      }
    }

    async function toggleCurrentTaskStatus() {
      if (!currentStatsTask) return;
      const taskState = TaskSystem.getTaskState(currentStatsTask);
      if (taskState.code === "expired") {
        alert("任务已过期，无法通过重新开放状态恢复。需要在后续版本中修改截止日期。");
        return;
      }

      const nextStatus = currentStatsTask.status === "closed" ? "active" : "closed";
      const actionText = nextStatus === "closed" ? "关闭" : "重新开放";
      if (!confirm(`确定要${actionText}任务“${currentStatsTask.task_title || currentStatsTask.task_code}”吗？`)) return;

      const statusBox = document.getElementById("statsStatus");
      statusBox.textContent = `正在${actionText}任务……`;

      try {
        const updated = await TaskSystem.updateTaskStatus(currentStatsTask.task_code, nextStatus);
        currentStatsTask = updated || { ...currentStatsTask, status: nextStatus };
        statusBox.textContent = `任务已${actionText}。`;
        renderTaskResults(currentStatsTask, currentStatsResults);
      } catch (error) {
        console.error(error);
        statusBox.textContent = `任务状态更新失败：${error.message || error}`;
      }
    }

    async function searchTaskResults() {
      const input = document.getElementById("taskSearchInput");
      const button = document.getElementById("taskSearchBtn");
      const status = document.getElementById("statsStatus");
      const resultsBox = document.getElementById("statsResults");

      if (!window.TaskSystem || !TaskSystem.ensureReady()) {
        status.textContent = "任务系统文件没有正确加载，请确认 index.html 与 js 文件夹一起上传。";
        return;
      }

      const taskCode = TaskSystem.extractTaskId(input.value);
      if (!taskCode) {
        status.textContent = "请粘贴有效的 taskId 或原始任务链接。";
        resultsBox.innerHTML = "";
        return;
      }

      button.disabled = true;
      status.textContent = "正在查询任务完成情况……";
      resultsBox.innerHTML = "";
      currentStatsTask = null;
      currentStatsResults = [];
      lastStatsExport = null;
      setStatsControlsEnabled(false);

      try {
        const task = await TaskSystem.loadTask(taskCode);
        if (!task) {
          status.textContent = "没有找到该任务。请确认 taskId 是否正确，或粘贴原始任务链接。";
          return;
        }

        const results = await TaskSystem.loadTaskResults(taskCode);
        status.textContent = `已找到任务：${task.task_title || task.task_code}`;
        renderTaskResults(task, results);
      } catch (error) {
        console.error(error);
        status.textContent = "查询失败：" + (error.message || error);
      } finally {
        button.disabled = false;
      }
    }

    document.addEventListener("keydown", event => {
      if (event.key === "Escape" && document.getElementById("statsModule").classList.contains("open")) {
        closeStatsModule();
      }
      if (event.key === "Enter" && document.activeElement?.id === "taskSearchInput") {
        searchTaskResults();
      }
    });

    function renderCards() {
      cardsLayer.innerHTML = "";

      const start = currentPage * cardsPerPage;
      const pageCards = cards.slice(start, start + cardsPerPage);

      pageCards.forEach((item, index) => {
        const button = document.createElement("button");
        button.className = `game-card slot-${index}`;
        button.type = "button";

        button.innerHTML = `
          <div class="card-inner">
            <div class="icon-wrap">
              <div class="icon">${item.icon}</div>
            </div>

            <div class="text-panel">
              <h2 class="game-title">${item.title}</h2>
              <p class="game-en">${item.en}</p>
              <div class="ornament"><span></span></div>
            </div>
          </div>
        `;

        button.addEventListener("click", () => {
          button.classList.add("clicked");

          setTimeout(() => {
            if (item.action === "stats") {
              openStatsModule();
              button.classList.remove("clicked");
            } else if (item.url && item.url !== "#") {
              window.location.href = item.url;
            } else {
              alert("这个模块还没有设置链接。请先在代码中的 url 位置填入网页地址。");
              button.classList.remove("clicked");
            }
          }, 220);
        });

        cardsLayer.appendChild(button);
      });

      updateControls();
      renderDots();
    }

    function renderDots() {
      pageDots.innerHTML = "";

      for (let i = 0; i < getTotalPages(); i++) {
        const dot = document.createElement("div");
        dot.className = i === currentPage ? "dot active" : "dot";
        pageDots.appendChild(dot);
      }
    }

    function updateControls() {
      prevBtn.disabled = currentPage === 0;
      nextBtn.disabled = currentPage === getTotalPages() - 1;
    }

    prevBtn.addEventListener("click", () => {
      if (currentPage > 0) {
        currentPage--;
        renderCards();
      }
    });

    nextBtn.addEventListener("click", () => {
      if (currentPage < getTotalPages() - 1) {
        currentPage++;
        renderCards();
      }
    });

    renderCards();
  </script>
</body>
</html>
